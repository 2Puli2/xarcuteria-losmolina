<!-- Overlay -->
@if (isOpen()) {
  <div class="sidebar-overlay" (click)="close()"></div>
}

<!-- Sidebar -->
<aside class="sidebar" [class.sidebar--open]="isOpen()">
  <div class="sidebar__header">
    <div class="sidebar__lang-selector">
      <app-language-selector></app-language-selector>
    </div>
    <button class="sidebar__close" (click)="close()" [attr.aria-label]="idioma.t().sidebar.closeMenu">
      ✕
    </button>
  </div>

  <nav class="sidebar__nav">
    @for (link of navLinks(); track link.sectionId) {
      <button class="sidebar__link" (click)="onNavigate(link.sectionId)">
        {{ link.label }}
      </button>
    }
  </nav>

  <div class="sidebar__footer">
    <a class="sidebar__footer-link" [routerLink]="idioma.localizeRoute('/trabaja-con-nosotros')" (click)="close()">
      {{ idioma.t().sidebar.work }}
    </a>
  </div>
</aside>
