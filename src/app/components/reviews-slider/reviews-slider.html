@if (getCurrentReview(); as review) {
  <div class="reviews-slider">
    <div class="reviews-slider__header">
      <h3 class="reviews-slider__title">{{ idioma.t().reviews.title }}</h3>
    </div>

    <!-- Contenido de la reseña -->
    <div class="reviews-slider__content">
      <div class="reviews-slider__review">
        <!-- Estrellas -->
        <div class="reviews-slider__stars">
          @for (star of getStars(review.rating); track $index) {
            <span class="reviews-slider__star" [class.reviews-slider__star--filled]="star === 1">
              ★
            </span>
          }
        </div>

        <!-- Texto de la reseña -->
        <p class="reviews-slider__text">{{ review.text }}</p>

        <!-- Autor -->
        <div class="reviews-slider__meta">
          <p class="reviews-slider__author">{{ review.author }}</p>
        </div>
      </div>
    </div>

    <!-- Navegación -->
    <div class="reviews-slider__navigation">
      <button
        class="reviews-slider__button reviews-slider__button--prev"
        (click)="previousReview()"
        [attr.aria-label]="idioma.t().reviews.prevLabel"
      >
        &#8249;
      </button>

      <div class="reviews-slider__dots">
        @for (item of reviews(); let i = $index; track i) {
          <button
            class="reviews-slider__dot"
            [class.reviews-slider__dot--active]="i === currentReviewIndex()"
            (click)="currentReviewIndex.set(i)"
            [attr.aria-label]="idioma.t().reviews.reviewLabel + ' ' + (i + 1)"
          ></button>
        }
      </div>

      <button
        class="reviews-slider__button reviews-slider__button--next"
        (click)="nextReview()"
        [attr.aria-label]="idioma.t().reviews.nextLabel"
      >
        &#8250;
      </button>
    </div>
  </div>
} @else {
  <div class="reviews-slider reviews-slider--empty">
    <p>{{ idioma.t().reviews.loading }}</p>
  </div>
}
