<section class="que-ofrecemos" id="que-ofrecemos">
  <div class="que-ofrecemos__container">
    <!-- Título de sección -->
    <app-title
      [text]="idioma.t().offer.title"
      [subtitle]="idioma.t().offer.subtitle"
      variant="light"
    />

    <!-- Banner promoción miércoles -->
    <div class="que-ofrecemos__promo">
      <div class="que-ofrecemos__promo-body">
        <span class="que-ofrecemos__promo-day">{{ idioma.t().offer.promoDay }}</span>
        <p class="que-ofrecemos__promo-title">{{ idioma.t().offer.promoTitle }}</p>
        <p class="que-ofrecemos__promo-condition">{{ idioma.t().offer.promoCondition }}</p>
      </div>
      <div class="que-ofrecemos__promo-highlight">
        <span class="que-ofrecemos__promo-number">10%</span>
        <span class="que-ofrecemos__promo-label">DTO.</span>
      </div>
    </div>

    <!-- Pestañas -->
    <div class="que-ofrecemos__tabs">
      <button
        class="que-ofrecemos__tab"
        [class.que-ofrecemos__tab--active]="activeTab() === 'charcuteria'"
        (click)="setTab('charcuteria')"
      >
        {{ idioma.t().offer.tabCharcuteria }}
      </button>
      <button
        class="que-ofrecemos__tab"
        [class.que-ofrecemos__tab--active]="activeTab() === 'degustacion'"
        (click)="setTab('degustacion')"
      >
        {{ idioma.t().offer.tabDegustacion }}
      </button>
    </div>

    <!-- Contenido: Somos Charcutería -->
    @if (activeTab() === 'charcuteria') {
      <app-somos-charcuteria />
    }

    <!-- Contenido: Degustación de productos -->
    @if (activeTab() === 'degustacion') {
      <app-degustacion />
    }
  </div>
</section>
