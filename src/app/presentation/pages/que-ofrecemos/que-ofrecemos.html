<section class="que-ofrecemos" id="que-ofrecemos">
  <div class="que-ofrecemos__container">
    <app-title
      [text]="idioma.t().offer.title"
      [subtitle]="idioma.t().offer.subtitle"
      variant="light"
    />

    <div class="que-ofrecemos__tabs">
      <button
        class="que-ofrecemos__tab"
        [class.que-ofrecemos__tab--active]="activeTab() === 'charcuteria'"
        (click)="setTab('charcuteria')"
      >
        {{ idioma.t().offer.tabCharcuteria }}
      </button>
      <button
        class="que-ofrecemos__tab"
        [class.que-ofrecemos__tab--active]="activeTab() === 'degustacion'"
        (click)="setTab('degustacion')"
      >
        {{ idioma.t().offer.tabDegustacion }}
      </button>
    </div>

    @if (activeTab() === 'charcuteria') {
      <app-somos-charcuteria />
    }

    @if (activeTab() === 'degustacion') {
      <app-degustacion />
    }
  </div>
</section>
