<section class="quienes-somos" id="quienes-somos">
  <div class="quienes-somos__container">
    <app-title
      [text]="idioma.t().about.title"
      [subtitle]="idioma.t().about.subtitle"
      variant="primary"
    />

    <div class="quienes-somos__content">
      <div class="quienes-somos__text">
        <p [innerHTML]="idioma.t().about.text1"></p>
        <p>{{ idioma.t().about.text2 }}</p>
        <p>{{ idioma.t().about.text3 }}</p>
      </div>
    </div>

    <app-photo-slider />

    <div class="quienes-somos__divider"></div>

  </div>
</section>
