<div class="charcuteria">
  <div class="charcuteria__description-block">
    <p class="charcuteria__description">{{ idioma.t().offer.charcuteriaDescriptionIntro }}</p>
    <p class="charcuteria__description charcuteria__description--accent">
      {{ idioma.t().offer.charcuteriaDescriptionBrands }}
    </p>
  </div>

  <div class="charcuteria__brands-section">
    <div class="charcuteria__brand-stage">
      <a
        class="charcuteria__brand"
        [class.charcuteria__brand--visible]="visible()"
        [href]="currentBrand.url"
        target="_blank"
        rel="noopener noreferrer"
        [title]="currentBrand.name"
      >
        <img
          class="charcuteria__brand-image"
          [src]="currentBrand.image"
          [alt]="currentBrand.name"
        />
        <span class="charcuteria__brand-name">{{ currentBrand.name }}</span>
      </a>
    </div>
  </div>
</div>
